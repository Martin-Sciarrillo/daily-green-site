name: Daily Green

# Mantiene el grafico de contribuciones verde generando actividad diaria real en el site.
on:
  schedule:
    # 12:10 UTC (~09:10 ART). El cron de Actions puede demorarse algunos minutos: es normal.
    - cron: "10 12 * * *"
  workflow_dispatch:        # permite dispararlo a mano desde la pestaña Actions
  push:
    branches: [ main ]

permissions:
  contents: write           # necesario para que el bot pushee de vuelta

concurrency:
  group: daily-green
  cancel-in-progress: false

jobs:
  green:
    runs-on: ubuntu-latest
    env:
      # Intensidad del verde por dia. En vez de un numero fijo, cada dia cae en
      # un "tier" (alto/medio/bajo) segun un hash de la fecha, y una minoria de
      # dias queda en cero para que luzca real. Ver el step de mas abajo.
      # IMPORTANTE: este email debe estar VERIFICADO en tu cuenta de GitHub,
      # si no, los commits no cuentan en tu grafico.
      # Guarda el valor real en Settings > Secrets and variables > Actions > Variables: AUTHOR_EMAIL
      AUTHOR_EMAIL: ${{ vars.AUTHOR_EMAIL }}
      AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
      SITE_TZ: "America/Argentina/Buenos_Aires"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configurar identidad git
        run: |
          git config user.email "${AUTHOR_EMAIL:-${{ github.actor }}@users.noreply.github.com}"
          git config user.name  "${AUTHOR_NAME:-${{ github.actor }}}"

      - name: Generar actividad y commitear
        run: |
          set -e
          # Hash de la fecha local => numero estable por dia (mismo dia, mismo N
          # ante reruns) pero impredecible de un dia al otro.
          SEED=$(TZ="$SITE_TZ" date +%Y%m%d)
          HASH=$(printf '%s' "$SEED" | sha256sum)
          P=$(( 16#${HASH:0:4} % 100 ))   # 0-99: elige el tier del dia
          Q=$(( 16#${HASH:4:4} ))         # entropia para el numero dentro del tier
          # Distribucion de tiers (da variedad de colores en el grafico):
          #   ~12% dias sin actividad (minoria, para que luzca real)
          #   ~35% tier bajo    (verde claro)   1-3
          #   ~30% tier medio   (verde medio)   5-8
          #   ~23% tier alto    (verde fuerte) 10-15
          if   [ "$P" -lt 12 ]; then N=0; TIER="off"
          elif [ "$P" -lt 47 ]; then N=$(( 1  + Q % 3 )); TIER="bajo"
          elif [ "$P" -lt 77 ]; then N=$(( 5  + Q % 4 )); TIER="medio"
          else                       N=$(( 10 + Q % 6 )); TIER="alto"
          fi
          echo "Tier de hoy: $TIER -> $N commit(s)"
          if [ "$N" -eq 0 ]; then
            echo "Dia sin actividad, nada que commitear."
            exit 0
          fi
          for i in $(seq 1 "$N"); do
            node scripts/generate-daily.mjs
            git add -A
            if git diff --cached --quiet; then
              echo "Sin cambios en iteracion $i, salto."
            else
              git commit -m "chore(daily): actividad $(date -u +%FT%TZ) [$i/$N]"
            fi
            sleep 1
          done

      - name: Push
        run: |
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push)
